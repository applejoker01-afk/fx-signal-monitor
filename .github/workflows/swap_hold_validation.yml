name: Swap Hold Validation

on:
  workflow_dispatch:
    inputs:
      backtest_days:
        description: "検証日数"
        required: false
        default: "180"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run swap hold validation
        env:
          BACKTEST_DAYS: ${{ github.event.inputs.backtest_days }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python run_swap_hold_validation.py
