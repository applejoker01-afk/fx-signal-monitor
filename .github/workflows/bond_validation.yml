name: Bond Validation

on:
  workflow_dispatch:
    inputs:
      backtest_days:
        description: "検証日数"
        required: false
        default: "180"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run bond validation
        env:
          BACKTEST_DAYS: ${{ github.event.inputs.backtest_days }}
          FRED: ${{ secrets.FRED }}
          FINNHUB: ${{ secrets.FINNHUB }}
        run: python run_bond_validation.py
