name: FX Signal Monitor

on:
  schedule:
    # 毎時05分に実行（UTC）
    - cron: '5 * * * *'
  workflow_dispatch:  # 手動実行を許可
  push:
    branches: [main]

# GitHub Pages公式デプロイに必要な権限
permissions:
  contents: write
  pages: write
  id-token: write

# 同時実行を防止
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────
  # Job 1: シグナルスキャンとHTML生成
  # ─────────────────────────────
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run FX signal scanner
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB: ${{ secrets.FINNHUB }}
          # Obsidian Vault連携（任意。未設定でもスキャンは継続）
          OBSIDIAN_VAULT_PAT:   ${{ secrets.OBSIDIAN_VAULT_PAT }}
          OBSIDIAN_VAULT_OWNER: ${{ secrets.OBSIDIAN_VAULT_OWNER }}
          OBSIDIAN_VAULT_REPO:  ${{ secrets.OBSIDIAN_VAULT_REPO }}
          OBSIDIAN_VAULT_PATH:  ${{ secrets.OBSIDIAN_VAULT_PATH }}
        run: python signal_scanner.py

      - name: Push Geopolitical Risk Diary to separate repo
        if: always()
        continue-on-error: true
        env:
          DIARY_TOKEN: ${{ secrets.DIARY_REPO_TOKEN }}
        run: |
              git config --global user.email "fx-monitor-bot@github-actions"
              git config --global user.name "FX Monitor Bot"

              # diary repoをclone
              git clone https://x-access-token:${DIARY_TOKEN}@github.com/applejoker01-afk/fx-geopolitical-diary.git diary_repo

              # 出力された日記をコピー
              mkdir -p diary_repo/Geopolitical\ Risk\ Diary
              cp -r docs/diary_output/* diary_repo/Geopolitical\ Risk\ Diary/ 2>/dev/null || true

              cd diary_repo
              git add .
              if git diff --staged --quiet; then
                echo "No diary changes to commit"
              else
                git commit -m "🤖 Auto-update Geopolitical Risk Diary $(date -u +'%Y-%m-%d %H:%M UTC')"
                git push
              fi
              
      - name: Commit updated state (for diff detection)
        run: |
          git config --local user.email "fx-monitor-bot@github-actions"
          git config --local user.name  "FX Monitor Bot"
          git add docs/last_signals.json docs/index.html data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-update FX signals $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main || true
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  # ─────────────────────────────
  # Job 2: GitHub Pagesへデプロイ
  # ─────────────────────────────
  deploy:
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
