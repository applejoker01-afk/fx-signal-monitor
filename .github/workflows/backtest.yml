name: Monthly Backtest

on:
  schedule:
    # 毎月1日 JST 10:00 (UTC 1:00)
    - cron: '0 1 1 * *'
  workflow_dispatch:
    inputs:
      lookback_days:
        description: 'バックテスト対象日数'
        required: false
        default: '180'

permissions:
  contents: read

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run backtest
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BACKTEST_DAYS: ${{ github.event.inputs.lookback_days || '180' }}
        run: python run_backtest.py
