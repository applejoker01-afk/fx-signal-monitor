name: Weekly Data Refresh

on:
  schedule:
    # 毎週日曜 UTC 00:00（JST 09:00）に実行
    - cron: '0 0 * * 0'
  workflow_dispatch:  # 手動実行も許可

permissions:
  contents: write

concurrency:
  group: "data-refresh"
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run data refresh
        env:
          # 任意のAPIキー（未設定の場合はskip・既存データ維持）
          FRED_API_KEY:    ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python data_refresh.py

      - name: Commit updated data files
        run: |
          git config --local user.email "fx-monitor-bot@github-actions"
          git config --local user.name  "FX Monitor Bot"
          git add data/central_bank_rates.json data/economic_calendar.json data/auto_refresh_log.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Auto-refresh data $(date -u +'%Y-%m-%d UTC')"
            git pull --rebase origin main || true
            git push
          fi
