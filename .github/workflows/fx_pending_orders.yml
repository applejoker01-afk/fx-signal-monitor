name: FX Pending Order Scan (3x/day, JST 07:00/13:00/21:00)

# 2026-07-20追加: 仕事中・就寝中でも毎時のリアルタイム通知に気づけないため、
# 1日3回だけ「押し目狙いの指値待機シグナル」を専用に通知する。
# ENTRY_MODE=limit でsignal_scanner.pyを実行すると、★4以上の新規シグナルは
# 即座にオープンせず data/pending_orders.json に指値注文として登録される。
# 保有ポジションのトレール/TP判定や指値の約定チェック自体は、既存の
# fx_signal_monitor.yml（毎時実行）側で引き続き行われる。

on:
  schedule:
    # 07:00 JST
    - cron: '0 22 * * *'
    # 13:00 JST
    - cron: '0 4 * * *'
    # 21:00 JST
    - cron: '0 12 * * *'
  workflow_dispatch:  # 手動実行を許可

jobs:
  pending_scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run FX signal scanner (指値待機モード)
        env:
          ENTRY_MODE: limit
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          OBSIDIAN_VAULT_PAT:   ${{ secrets.OBSIDIAN_VAULT_PAT }}
          OBSIDIAN_VAULT_OWNER: ${{ secrets.OBSIDIAN_VAULT_OWNER }}
          OBSIDIAN_VAULT_REPO:  ${{ secrets.OBSIDIAN_VAULT_REPO }}
          OBSIDIAN_VAULT_PATH:  ${{ secrets.OBSIDIAN_VAULT_PATH }}
        run: python signal_scanner.py

      - name: Commit updated state (pending_orders.json等)
        run: |
          git config --local user.email "fx-monitor-bot@github-actions"
          git config --local user.name  "FX Monitor Bot"
          git add docs/ data/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Pending-order scan (ENTRY_MODE=limit) $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main || true
            git push
          fi
