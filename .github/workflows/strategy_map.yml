name: Strategy Map Update

on:
  schedule:
    - cron: "0 21 * * 0"  # 毎週日曜21:00 UTC（月曜朝6:00 JST）
  workflow_dispatch:  # 手動実行も可

jobs:
  update-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic

      - name: Generate strategy map
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_strategy_map.py

      - name: Commit strategy map
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/strategy_map.json
          git commit -m "Update adaptive strategy map" || { echo "No changes"; exit 0; }
          # push競合対策: 最大3回リトライ（他のワークフローと同時push対策）
          for i in 1 2 3; do
            if git push; then
              echo "✓ Push成功 (試行$i)"
              exit 0
            fi
            echo "⚠ Push競合検知 (試行$i) → pull --rebase してリトライ"
            git pull --rebase origin main || true
            sleep 3
          done
          echo "✗ 3回試行しても失敗"
          exit 1
